<body>
  <h1>Carrot Cake</h1>
  <p>a simple recipe to make in afternoon</p>
  <h2>Ingredients</h2>
  <ul>
    <li>1 carrot</li>
    <li>2 eggs</li>
    <li>300ml milk</li>
    <li>300mg flour</li>
  </ul>
  <h2>Instructions</h2>
  <ol>
    <li>cut the carrot in many pieces.</li>
    <li>break the eggs on a bowl.</li>
    <li>drop the milk and flour on the bowl.</li>
    <li>mix all the things and bake.</li>
  </ol>
  <img src="https://thergon.com/wp-content/uploads/2023/04/Modelo-1200x800-7.jpg" alt="carrotcake">
</body>
